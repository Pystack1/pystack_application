<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background:#f8fafc; font-family:Arial,sans-serif;">
    
    <!-- Logo Bar -->
    <div style="background:#0f172a; padding:20px; text-align:center;">
        <h2 style="color:#38bdf8; margin:0; font-size:20px; letter-spacing:2px;">PYSTACK ACADEMY</h2>
    </div>
    
    <!-- Content -->
    <div style="max-width:480px; margin:0 auto; padding:30px 20px;">
        
        <h1 style="color:#0f172a; font-size:26px; margin:0 0 8px;">Verify Your Email</h1>
        <p style="color:#64748b; font-size:15px; margin:0 0 25px;">Use the code below to complete your verification.</p>
        
        <!-- OTP Box -->
        <div style="background:#fff; border:2px solid #e2e8f0; border-radius:12px; padding:25px; text-align:center; margin:20px 0;">
            <p style="color:#94a3b8; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:2px; margin:0 0 12px;">Your Code</p>
            <p style="color:#0f172a; font-size:38px; font-weight:800; letter-spacing:8px; margin:0; font-family:monospace;">{{OTP}}</p>
            <p style="color:#b45309; font-size:13px; margin:15px 0 0; background:#fef3c7; display:inline-block; padding:8px 16px; border-radius:20px;">⏱️ Expires in 15 minutes</p>
        </div>
        
        <!-- Security -->
        <div style="background:#fef2f2; border-left:4px solid #ef4444; padding:15px 20px; margin-top:20px;">
            <p style="color:#991b1b; font-size:13px; margin:0; line-height:1.5;">
                <strong>🔒 Security:</strong> Never share this code. If you didn't request this, ignore this email.
            </p>
        </div>
        
    </div>
    
    <!-- Footer -->
    <div style="background:#e2e8f0; padding:20px; text-align:center;">
        <p style="color:#475569; font-size:12px; margin:0;">© 2026 {{FROM_NAME}}. Automated email, do not reply.</p>
    </div>
    
</body>
</html>
